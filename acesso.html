<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso liberado - Lista Bras</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff;display:grid;place-items:center;min-height:100vh;padding:24px}
    main{max-width:580px;background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;font-size:28px}p{line-height:1.6;color:#d1d5db}.btn{display:inline-block;margin-top:14px;background:#22c55e;color:#04130a;text-decoration:none;font-weight:700;padding:13px 18px;border-radius:8px}.btn[aria-disabled="true"]{opacity:.55;pointer-events:none}.error{color:#fecaca}
  </style>
</head>
<body>
  <main>
    <h1 id="title">Validando seu acesso...</h1>
    <p id="message">Estamos conferindo seu token de compra.</p>
    <a id="download" class="btn" href="#" aria-disabled="true">Baixar lista em PDF</a>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const download = document.getElementById('download');

    async function validate() {
      if (!token) throw new Error('Token nao informado.');
      const response = await fetch('/api/verify-access?token=' + encodeURIComponent(token));
      if (!response.ok) throw new Error('Token invalido ou expirado.');
      title.textContent = 'Acesso liberado';
      message.textContent = 'Seu pagamento foi aprovado. Clique abaixo para baixar sua lista de fornecedores em PDF.';
      download.href = '/api/download?token=' + encodeURIComponent(token);
      download.setAttribute('aria-disabled', 'false');
    }

    validate().catch((error) => {
      title.textContent = 'Acesso nao liberado';
      message.textContent = error.message || 'Nao conseguimos validar seu acesso.';
      message.className = 'error';
      download.style.display = 'none';
    });
  </script>
</body>
</html>
